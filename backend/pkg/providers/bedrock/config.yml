# Simple tasks - reasoning model for better quality
simple:
  model: openai.gpt-oss-120b-1:0
  temperature: 0.5
  top_p: 0.5
  n: 1
  max_tokens: 6000
  price:
    input: 0.15
    output: 0.6

simple_json:
  model: openai.gpt-oss-120b-1:0
  temperature: 0.5
  top_p: 0.5
  n: 1
  max_tokens: 4000
  json: true
  price:
    input: 0.15
    output: 0.6

# Primary agent - multimodal with thinking capabilities
primary_agent:
